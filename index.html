<!DOCTYPE html>
<html>
<head>
    <title>Descubra sua porcentagem de gordura corporal</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

    <h1>Calcule seu porcentual de gordura</h1>

    <button id="botaoHistorico" onclick="mostrarHistorico()">Ver Historico</button>
    <div id="historico" style="display: none;"></div>


    <h2>Selecione seu gênero para começar</h2>
    <div id="genero">
    <button onclick="mostrarHomem()">Homem</button>
    <button onclick="mostrarMulher()">Mulher</button>
    <p id="resultado"></p>
    </div>

    <div id="formMasculino" style="display: none;">

    <h3>Peso (kg)</h3>
    <input type="number" id="PesoM" placeholder="Peso">

    <h3>Altura (cm)</h3>
    <input type="number" id="AlturaM" placeholder="Altura">

    <h3>Cintura (cm)</h3>
    <input type="number" id="CinturaM" placeholder="Cintura">

    <h3>Pescoço (cm)</h3>
    <input type="number" id="PescocoM" placeholder="Pescoco">

    </div>

    <div id="formFeminino" style="display: none;">

    <h3>Peso (kg)</h3>
    <input type="number" id="PesoF" placeholder="Peso">

    <h3>Altura (cm)</h3>
    <input type="number" id="AlturaF" placeholder="Altura">

    <h3>Cintura (cm)</h3>
    <input type="number" id="CinturaF" placeholder="Cintura">

    <h3>Pescoço (cm)</h3>
    <input type="number" id="PescocoF" placeholder="Pescoco">

    <h3>Quadril (cm)</h3>
    <input type="number" id="Quadril" placeholder="Quadril"> <br>

    </div>

    <div id="acoes">
    <button id="btnCalcular" onclick="calcular()" style="display: none;">Calcular</button>

    <button id="btnSalvar" onclick="salvarResultado()" style="display: none;">Salvar</button>

    <button id="btnLimpar" style="display: none;">Limpar</button>
    </div>

    <h2>Selecione o seu nível de atividade?</h2>
    <button id="btnSedentario" class="btnAtividade" onclick="nivelAtividade(10, this)">Sedentário</button>
    <button id="btnLeve" class="btnAtividade" onclick="nivelAtividade(12, this)">Levemente ativo</button>
    <button id="btnModerado" class="btnAtividade" onclick="nivelAtividade(13, this)">Moderadamente ativo</button>
    <button id="btnMuito" class="btnAtividade" onclick="nivelAtividade(15, this)">Muito ativo</button>
    <button id="btnExtremo" class="btnAtividade" onclick="nivelAtividade(19, this)">Extremamente ativo</button>

    <script src="script.js"></script>

    <div id="painelInfo"></div>


</body>    
</html>
